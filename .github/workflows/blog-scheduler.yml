name: Refectl Blog Architect Scheduler

on:
  schedule:
    # Runs at 02:00 UTC every 3 days
    - cron: '0 2 */3 * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  automate-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Blog Architect
        run: |
          curl -X POST "https://www.refectl.com/api/blog-automate?secret=${{ secrets.CRON_SECRET }}" \
          -H "Content-Type: application/json"
